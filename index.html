  // PASTE YOUR FIREBASE CONFIG HERE
  const firebaseConfig = {

    authDomain: "gate-d2cdd.firebaseapp.com",
    databaseURL: "https://gate-d2cdd-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "gate-d2cdd",
    storageBucket: "gate-d2cdd.firebasestorage.app",
    messagingSenderId: "540566362247",
    appId: "1:540566362247:web:36845edaed189a27560022"
  };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  window._db = {
    saveTest:        async (t)   => set(ref(db,`tests/${t.code}`), t),
    loadTests:       async ()    => { const s=await get(ref(db,'tests')); return s.exists()?Object.values(s.val()):[];},
    loadTest:        async (c)   => { const s=await get(ref(db,`tests/${c}`)); return s.exists()?s.val():null;},
    deleteTest:      async (c)   => set(ref(db,`tests/${c}`),null),
    saveSubmission:  async (sub) => push(ref(db,`submissions/${sub.testCode}`), sub),
    loadSubmissions: async (tc)  => { const s=await get(ref(db,`submissions/${tc}`)); return s.exists()?Object.values(s.val()):[];},
    saveStudents:    async (lst) => set(ref(db,'students'), lst),
    loadStudents:    async ()    => { const s=await get(ref(db,'students')); return s.exists()?s.val():{};},
    saveCfg:         async (cfg) => set(ref(db,'config'), cfg),
    loadCfg:         async ()    => { const s=await get(ref(db,'config')); return s.exists()?s.val():{};},
  };
  window._dbReady = true;
  document.dispatchEvent(new Event('db-ready'));
<\/script>
<style>
:root{--bg:#07090f;--s1:#0d1117;--s2:#131920;--s3:#1a2330;--border:#1e2d3d;--border2:#26374a;--a1:#38bdf8;--a2:#818cf8;--a3:#34d399;--red:#f87171;--yellow:#fbbf24;--orange:#fb923c;--text:#e2eaf4;--muted:#4d6a85;--muted2:#2d4459;--r:10px;--r2:16px;--r3:22px}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--s1)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.screen{display:none;min-height:100vh;flex-direction:column}.screen.on{display:flex}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;border:none;border-radius:8px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .18s;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,#0369a1,var(--a1));color:#000;box-shadow:0 0 18px rgba(56,189,248,.2)}.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(56,189,248,.35)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}.btn-ghost:hover{color:var(--text);border-color:var(--border2)}
.btn-success{background:linear-gradient(135deg,#059669,var(--a3));color:#000}.btn-danger{background:linear-gradient(135deg,#b91c1c,var(--red));color:#fff}
.btn-purple{background:linear-gradient(135deg,#4f46e5,var(--a2));color:#fff}
.btn-sm{padding:7px 14px;font-size:13px}.btn-lg{padding:14px 32px;font-size:16px;border-radius:10px}
.btn:disabled{opacity:.38;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.inp,.sel,.ta{width:100%;padding:11px 14px;background:var(--s2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.inp:focus,.sel:focus,.ta:focus{border-color:var(--a1)}.ta{resize:vertical;min-height:70px;line-height:1.6}.sel option{background:var(--s2)}
.lbl{font-size:11px;color:var(--muted);margin-bottom:6px;display:block;font-weight:700;text-transform:uppercase;letter-spacing:.6px}
.fg{margin-bottom:16px}.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}.full{grid-column:1/-1}
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:24px}
.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700}
.bb{background:rgba(56,189,248,.12);color:var(--a1);border:1px solid rgba(56,189,248,.2)}.bg{background:rgba(52,211,153,.12);color:var(--a3);border:1px solid rgba(52,211,153,.2)}
.br{background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.2)}.by{background:rgba(251,191,36,.12);color:var(--yellow);border:1px solid rgba(251,191,36,.2)}
.bp{background:rgba(129,140,248,.15);color:var(--a2);border:1px solid rgba(129,140,248,.2)}.bo{background:rgba(251,146,60,.12);color:var(--orange);border:1px solid rgba(251,146,60,.2)}
/* NAV */
.topnav{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid var(--border);background:rgba(7,9,15,.96);backdrop-filter:blur(12px);position:sticky;top:0;z-index:200;flex-shrink:0}
.logo{font-family:'IBM Plex Mono',monospace;font-size:19px;font-weight:600;color:var(--a1);letter-spacing:-1px}.logo span{color:var(--text)}
.uav{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#000;font-family:'IBM Plex Mono',monospace;flex-shrink:0}
.uchip{display:flex;align-items:center;gap:9px;background:var(--s2);border:1px solid var(--border);border-radius:999px;padding:5px 14px 5px 6px;font-size:13px}
/* LOGIN */
#login{background:radial-gradient(ellipse 80% 70% at 50% 0%,rgba(56,189,248,.12) 0%,transparent 65%)}
.login-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:40px}
.login-box{background:var(--s1);border:1px solid var(--border);border-radius:var(--r3);padding:48px 40px;max-width:400px;width:100%;position:relative;overflow:hidden}
.login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--a1),var(--a2),var(--a3))}
.ltabs{display:flex;background:var(--s2);border-radius:8px;padding:3px;margin-bottom:24px;border:1px solid var(--border)}
.ltab{flex:1;padding:8px;text-align:center;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .18s}
.ltab.on{background:var(--s3);color:var(--text);border:1px solid var(--border)}
/* ADMIN */
#admin{flex-direction:row}
.sidebar{width:220px;background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
.sb-logo{padding:18px 20px;font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;color:var(--a1);border-bottom:1px solid var(--border)}
.sb-lbl{padding:14px 20px 4px;font-size:10px;color:var(--muted2);font-weight:700;text-transform:uppercase;letter-spacing:1px}
.sb-link{display:flex;align-items:center;gap:10px;padding:10px 20px;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;border-left:3px solid transparent;transition:all .18s}
.sb-link:hover{color:var(--text);background:rgba(255,255,255,.02)}.sb-link.on{color:var(--a1);border-left-color:var(--a1);background:rgba(56,189,248,.05)}
.sb-bot{margin-top:auto;padding:14px;border-top:1px solid var(--border)}
.am{flex:1;overflow-y:auto;min-width:0}
.am-head{padding:22px 28px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:10}
.am-head h2{font-size:20px;font-weight:800;letter-spacing:-.5px}
.am-body{padding:22px 28px;max-width:1100px}
/* QB */
.qb{background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);padding:20px;margin-bottom:12px}
.qb-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.qbn{background:var(--a1);color:#000;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;padding:3px 9px;border-radius:5px}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.opt-row{display:flex;align-items:center;gap:8px}
.opt-row input[type=checkbox],.opt-row input[type=radio]{accent-color:var(--a1);width:15px;height:15px;flex-shrink:0;cursor:pointer}
.ol{font-size:11px;color:var(--muted);width:20px;flex-shrink:0;font-weight:600;font-family:'IBM Plex Mono',monospace}
.mk-box{background:rgba(56,189,248,.05);border:1px solid rgba(56,189,248,.12);border-radius:7px;padding:9px 13px;font-size:12px;margin-top:8px;color:var(--muted)}
/* TEST ROWS */
.test-row{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;transition:border-color .2s}
.test-row:hover{border-color:var(--a1)}
/* STUDENT */
#student{background:var(--bg)}
.stnav{display:flex;padding:0 28px;border-bottom:1px solid var(--border);background:var(--s1);flex-shrink:0}
.sttab{padding:12px 18px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .18s}
.sttab.on{color:var(--a1);border-bottom-color:var(--a1)}
.stcontent{flex:1;overflow-y:auto}
/* EXAM */
#exam-screen{flex:1;display:none;flex-direction:column}
.exam-top{display:flex;align-items:center;justify-content:space-between;padding:12px 22px;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;gap:10px}
.tv{font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:600;color:var(--a1)}
.tv.warn{color:var(--yellow)}.tv.danger{color:var(--red);animation:blink .7s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}
.exam-layout{flex:1;display:grid;grid-template-columns:1fr 270px;min-height:0}
.exam-main{overflow-y:auto;padding:22px}
.exam-side{overflow-y:auto;background:var(--s1);border-left:1px solid var(--border);padding:14px;display:flex;flex-direction:column;gap:12px}
.q-panel{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:24px;margin-bottom:14px}
.qtag{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:3px 9px;border-radius:999px;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.qt-mcq{background:rgba(56,189,248,.1);color:var(--a1);border:1px solid rgba(56,189,248,.2)}
.qt-msq{background:rgba(251,191,36,.1);color:var(--yellow);border:1px solid rgba(251,191,36,.2)}
.qt-nat{background:rgba(52,211,153,.1);color:var(--a3);border:1px solid rgba(52,211,153,.2)}
.mcq-opts{display:flex;flex-direction:column;gap:9px}
.opt-btn{display:flex;align-items:center;gap:13px;padding:13px 16px;background:var(--s2);border:1.5px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s;text-align:left;font-family:'Outfit',sans-serif;font-size:15px;color:var(--text)}
.opt-btn:hover{border-color:var(--a1);background:rgba(56,189,248,.05)}
.opt-btn.sel{border-color:var(--a1);background:rgba(56,189,248,.09)}.opt-btn.sel .oc{background:var(--a1);border-color:var(--a1);color:#000}
.opt-btn.msel{border-color:var(--yellow);background:rgba(251,191,36,.07)}.opt-btn.msel .oc{background:var(--yellow);border-color:var(--yellow);color:#000}
.oc{width:28px;height:28px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:'IBM Plex Mono',monospace;flex-shrink:0;transition:all .15s}
.nat-inp{width:100%;max-width:260px;padding:13px 16px;background:var(--s2);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;outline:none;transition:border-color .2s;text-align:center}
.nat-inp:focus{border-color:var(--a3)}
.qnav{display:flex;gap:9px;margin-top:18px;flex-wrap:wrap}
.mrb{padding:7px 13px;background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2);border-radius:7px;color:var(--yellow);font-size:13px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .18s}
.mrb.on{background:rgba(251,191,36,.18);border-color:var(--yellow)}
.ts{text-align:center;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.qpal{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.qp{width:100%;aspect-ratio:1;border-radius:6px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;cursor:pointer;font-family:'IBM Plex Mono',monospace;transition:all .13s;background:var(--s2);color:var(--muted)}
.qp.cur{background:var(--a1);border-color:var(--a1);color:#000}.qp.ans{background:rgba(56,189,248,.15);border-color:var(--a1);color:var(--a1)}.qp.rev{background:rgba(251,191,36,.15);border-color:var(--yellow);color:var(--yellow)}
.leg{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted)}.ldot{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.slive{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:12px;font-size:13px}
.slr{display:flex;justify-content:space-between;margin-bottom:5px}
/* RESULT */
#result-screen{flex:1;display:none;flex-direction:column;overflow-y:auto}
.res-hero{text-align:center;padding:44px 24px 28px;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(56,189,248,.12),transparent)}
.sring{width:140px;height:140px;border-radius:50%;margin:0 auto 22px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;font-family:'IBM Plex Mono',monospace}
.sring svg{position:absolute;inset:0}.sring .pct{font-size:32px;font-weight:600;position:relative}.sring .plbl{font-size:11px;color:var(--muted);position:relative;font-family:'Outfit',sans-serif}
.res-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:720px;margin:24px auto}
.rs{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center}
.rs-v{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;margin-bottom:3px}.rs-l{font-size:11px;color:var(--muted)}
.rev-sec{max-width:820px;margin:0 auto;padding:0 22px 48px}
.rev-item{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:18px;margin-bottom:10px}
.ra{padding:9px 13px;border-radius:8px;font-size:13px;margin-bottom:5px;display:flex;align-items:center;gap:7px}
.ra-c{background:rgba(52,211,153,.07);border:1px solid rgba(52,211,153,.18);color:var(--a3)}
.ra-w{background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.18);color:var(--red)}
.ra-s{background:rgba(251,191,36,.07);border:1px solid rgba(251,191,36,.18);color:var(--yellow)}
.mchip{padding:2px 8px;border-radius:5px;font-size:11px;font-weight:700;font-family:'IBM Plex Mono',monospace}
.mc-p{background:rgba(52,211,153,.15);color:var(--a3)}.mc-n{background:rgba(248,113,113,.15);color:var(--red)}.mc-z{background:rgba(77,106,133,.15);color:var(--muted)}
/* LB */
.lbtsel{padding:20px 28px;border-bottom:1px solid var(--border)}
.lb-podium{display:flex;align-items:flex-end;justify-content:center;gap:14px;padding:32px 22px 22px;max-width:560px;margin:0 auto}
.pod{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1}
.pod-av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;font-family:'IBM Plex Mono',monospace;color:#000}
.pod-nm{font-size:13px;font-weight:700;text-align:center;word-break:break-word}
.pod-sc{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted)}
.pod-bl{width:100%;border-radius:8px 8px 0 0;display:flex;align-items:center;justify-content:center;font-size:20px}
.pod-1 .pod-av{background:linear-gradient(135deg,#f59e0b,#fde68a);border:3px solid #f59e0b}
.pod-2 .pod-av{background:linear-gradient(135deg,#94a3b8,#cbd5e1);border:3px solid #94a3b8}
.pod-3 .pod-av{background:linear-gradient(135deg,#b45309,#d97706);border:3px solid #b45309}
.pod-1 .pod-bl{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.25);height:80px}
.pod-2 .pod-bl{background:rgba(148,163,184,.08);border:1px solid rgba(148,163,184,.18);height:54px}
.pod-3 .pod-bl{background:rgba(180,83,9,.08);border:1px solid rgba(180,83,9,.18);height:40px}
.lb-tbl{max-width:800px;margin:0 auto;padding:0 22px 40px}
.lb-row{display:flex;align-items:center;gap:13px;padding:12px 15px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);margin-bottom:7px;transition:border-color .18s}
.lb-row:hover{border-color:var(--border2)}.lb-row.me{border-color:var(--a1);background:rgba(56,189,248,.04)}
.lb-rk{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;width:30px;text-align:center;flex-shrink:0}
.lbav{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#000;font-family:'IBM Plex Mono',monospace;flex-shrink:0}
.lb-bar{width:80px;height:5px;background:var(--border);border-radius:99px;overflow:hidden}
.lb-bar-f{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--a1),var(--a2))}
/* ANALYSIS */
.ansec{padding:20px 28px;max-width:1100px}
.antit{font-size:15px;font-weight:800;margin-bottom:14px;letter-spacing:-.3px}
.stat-g{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-b{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px}
.stat-v{font-family:'IBM Plex Mono',monospace;font-size:28px;font-weight:600;margin-bottom:3px}
.stat-l{font-size:11px;color:var(--muted);font-weight:500}
.chwrap{background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);padding:20px;margin-bottom:20px}
.chtit{font-size:12px;font-weight:700;margin-bottom:14px;color:var(--muted)}
.barchart{display:flex;align-items:flex-end;gap:10px;height:140px}
.bcol{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1}
.bfill{width:100%;border-radius:6px 6px 0 0;min-height:4px;position:relative}
.bval{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:700;font-family:'IBM Plex Mono',monospace;white-space:nowrap}
.blbl{font-size:10px;color:var(--muted);text-align:center;font-family:'IBM Plex Mono',monospace;font-weight:600;line-height:1.4}
.qat{width:100%;border-collapse:collapse;font-size:13px}
.qat th{text-align:left;padding:9px 13px;background:var(--s2);color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.qat td{padding:10px 13px;border-bottom:1px solid var(--border)}.qat tr:hover td{background:rgba(255,255,255,.015)}
.accbar{height:5px;background:var(--border);border-radius:99px;margin-top:3px;max-width:100px}
.accfill{height:100%;border-radius:99px}
.tlist{display:flex;flex-direction:column;gap:7px}
.trow{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--s2);border-radius:var(--r);border:1px solid var(--border)}
.trow.me{border-color:var(--a1);background:rgba(56,189,248,.04)}
.tbw{flex:2;height:7px;background:var(--border);border-radius:99px;overflow:hidden}
.tbf{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--a2),var(--a1))}
.tval{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);width:60px;text-align:right}
/* INSTR */
.ibox{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:36px;max-width:640px;width:100%}
.irule{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--border);font-size:14px;align-items:flex-start}
.tleg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0}
.tli{background:var(--s2);border-radius:8px;padding:11px;text-align:center;font-size:12px;border:1px solid var(--border)}
.tli strong{display:block;font-size:14px;margin-bottom:3px}
/* MODAL TOAST LOADER */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:500;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-bg.open{opacity:1;pointer-events:all}
.modal{background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:32px;max-width:450px;width:90%}
.modal h3{font-size:18px;font-weight:800;margin-bottom:8px}.modal p{color:var(--muted);margin-bottom:20px;line-height:1.7}
.mbtns{display:flex;gap:10px;justify-content:flex-end}
.toast{position:fixed;bottom:22px;right:22px;background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:12px 18px;font-size:14px;box-shadow:0 8px 40px rgba(0,0,0,.5);transform:translateY(80px);opacity:0;transition:all .3s;z-index:1000;display:flex;align-items:center;gap:9px;max-width:300px}
.toast.show{transform:translateY(0);opacity:1}.toast.ok{border-color:var(--a3)}.toast.err{border-color:var(--red)}
.loader{display:inline-block;width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--a1);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:999;color:var(--muted)}
.empty{text-align:center;padding:56px;color:var(--muted)}.empty-icon{font-size:44px;margin-bottom:12px}.empty h3{font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px}
.rtable{width:100%;border-collapse:collapse;font-size:13px}
.rtable th{text-align:left;padding:9px 13px;background:var(--s2);color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.rtable td{padding:11px 13px;border-bottom:1px solid var(--border)}.rtable tr:hover td{background:rgba(255,255,255,.018)}
@media(max-width:900px){#admin{flex-direction:column}.sidebar{width:100%;height:auto;position:relative}.exam-layout{grid-template-columns:1fr}.exam-side{display:none}.stat-g,.res-stats{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.g2,.opts-grid{grid-template-columns:1fr}.am-body,.am-head{padding-left:16px;padding-right:16px}.topnav{padding:12px 16px}.login-box{padding:36px 22px}}
</style>
</head>
<body>
<div class="loading-screen" id="ls"><div class="loader"></div><div>Connecting…</div></div>

<!-- LOGIN -->
<div id="login" class="screen">
<div class="login-wrap"><div class="login-box">
  <div style="text-align:center;margin-bottom:28px">
    <div style="font-family:'IBM Plex Mono',monospace;font-size:30px;font-weight:600;color:var(--a1)">GATE<span style="color:var(--text)">Portal</span></div>
    <div style="color:var(--muted);font-size:13px;margin-top:6px">Examination Management System</div>
  </div>
  <div class="ltabs">
    <div class="ltab on" id="lt-s" onclick="lTab('s')">&#127979; Student</div>
    <div class="ltab" id="lt-a" onclick="lTab('a')">&#9889; Admin</div>
  </div>
  <div id="lf-s">
    <div class="fg"><label class="lbl">Student UID</label><input class="inp" id="s-uid" placeholder="e.g. S01" autocomplete="off" oninput="this.value=this.value.toUpperCase()"></div>
    <div class="fg"><label class="lbl">Password</label><input class="inp" id="s-pass" type="password" placeholder="Your password" onkeydown="if(event.key==='Enter')sLogin()"></div>
    <button class="btn btn-primary btn-lg" style="width:100%" onclick="sLogin()">Login &#8594;</button>
  </div>
  <div id="lf-a" style="display:none">
    <div class="fg"><label class="lbl">Admin Password</label><input class="inp" id="a-pass" type="password" placeholder="Admin password" onkeydown="if(event.key==='Enter')aLogin()"></div>
    <button class="btn btn-primary btn-lg" style="width:100%" onclick="aLogin()">Admin Panel &#8594;</button>
    <div style="margin-top:10px;font-size:12px;color:var(--muted);text-align:center">Default: <span style="font-family:'IBM Plex Mono',monospace;color:var(--a1)">admin123</span> &mdash; change in Settings</div>
  </div>
</div></div>
</div>

<!-- ADMIN -->
<div id="admin" class="screen">
<div class="sidebar">
  <div class="sb-logo">&#9889; GATEPortal</div>
  <div class="sb-lbl">Exam</div>
  <div class="sb-link on" id="sl-tests"    onclick="aTab('tests')">&#128203; My Tests</div>
  <div class="sb-link"    id="sl-create"   onclick="aTab('create')">&#43; Create Test</div>
  <div class="sb-link"    id="sl-results"  onclick="aTab('results')">&#128202; Results</div>
  <div class="sb-lbl">Manage</div>
  <div class="sb-link"    id="sl-students" onclick="aTab('students')">&#128101; Students</div>
  <div class="sb-link"    id="sl-settings" onclick="aTab('settings')">&#9881; Settings</div>
  <div class="sb-bot"><button class="btn btn-ghost btn-sm" style="width:100%" onclick="logout()">&#8592; Logout</button></div>
</div>
<div class="am">
  <!-- TESTS -->
  <div id="at-tests">
    <div class="am-head"><h2>My Tests</h2><button class="btn btn-primary btn-sm" onclick="aTab('create')">&#43; New Test</button></div>
    <div class="am-body"><div id="tests-list"></div></div>
  </div>
  <!-- CREATE -->
  <div id="at-create" style="display:none">
    <div class="am-head"><h2>Create Test</h2><button class="btn btn-ghost btn-sm" onclick="aTab('tests')">&#8592; Back</button></div>
    <div class="am-body">
      <div class="card" style="margin-bottom:16px">
        <div style="font-size:14px;font-weight:700;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)">&#128203; Test Details</div>
        <div class="g2">
          <div class="fg"><label class="lbl">Test Title *</label><input class="inp" id="ct-title" placeholder="e.g. GATE CS Mock 2025"></div>
          <div class="fg"><label class="lbl">Subject</label><input class="inp" id="ct-sub" placeholder="e.g. Computer Science"></div>
          <div class="fg"><label class="lbl">Duration (minutes)</label><input class="inp" id="ct-dur" type="number" value="180" min="1"></div>
          <div class="fg"><label class="lbl">Total Marks</label><input class="inp" id="ct-total" type="number" value="100" min="1"></div>
          <div class="fg"><label class="lbl">Multiple Attempts?</label>
            <select class="sel" id="ct-multi"><option value="no">No &mdash; one attempt per student</option><option value="yes">Yes &mdash; unlimited</option></select></div>
          <div class="fg full"><label class="lbl">Instructions</label><textarea class="ta" id="ct-instr" placeholder="Instructions for students&#8230;"></textarea></div>
        </div>
        <div style="background:rgba(56,189,248,.05);border:1px solid rgba(56,189,248,.12);border-radius:8px;padding:10px 13px;font-size:12px;color:var(--muted)">&#128161; <strong style="color:var(--a1)">GATE Marking:</strong> MCQ &minus;1/3 or &minus;2/3 &middot; MSQ no negative &middot; NAT no negative</div>
      </div>
      <div class="card">
        <div style="font-size:14px;font-weight:700;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)">&#10067; Questions</div>
        <div id="qbl"></div>
        <div style="display:flex;gap:9px;flex-wrap:wrap">
          <button class="btn btn-ghost btn-sm" onclick="addQ('mcq')">+ MCQ</button>
          <button class="btn btn-ghost btn-sm" onclick="addQ('msq')">+ MSQ</button>
          <button class="btn btn-ghost btn-sm" onclick="addQ('nat')">+ NAT</button>

      </div>
      <div style="margin-top:16px;display:flex;gap:10px;justify-content:flex-end">
        <button class="btn btn-ghost" onclick="aTab('tests')">Cancel</button>
        <button class="btn btn-primary btn-lg" id="pub-btn" onclick="saveTest()">&#128190; Publish Test</button>
      </div>
    </div>
  </div>
  <!-- RESULTS -->
  <div id="at-results" style="display:none">
    <div class="am-head"><h2>Results</h2><button class="btn btn-ghost btn-sm" onclick="loadAdminRes()">&#8635; Refresh</button></div>
    <div class="am-body">
      <div class="fg" style="margin-bottom:18px"><label class="lbl">Select Test</label>
        <select class="sel" id="res-sel" onchange="loadAdminRes()" style="max-width:400px"></select></div>
      <div id="res-content"></div>
    </div>
  </div>
  <!-- STUDENTS -->
  <div id="at-students" style="display:none">
    <div class="am-head"><h2>Student Accounts</h2><div style="display:flex;gap:8px"><button class="btn btn-ghost btn-sm" onclick="printCreds()">&#128438; Print Credentials</button><button class="btn btn-primary btn-sm" onclick="doSaveStudents()">&#128190; Save All</button></div></div>
    <div class="am-body">
      <div class="card">
        <div style="font-size:14px;font-weight:700;margin-bottom:4px">Up to 10 Student Accounts</div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:18px">Set UID and password for each student. UIDs are fixed (S01&ndash;S10).</div>
        <div style="display:grid;grid-template-columns:90px 1fr 1fr;gap:9px;margin-bottom:8px">
          <div class="lbl" style="margin-bottom:0">UID</div><div class="lbl" style="margin-bottom:0">Name</div><div class="lbl" style="margin-bottom:0">Password</div>
        </div>
        <div id="sted"></div>
      </div>
    </div>
  </div>
  <!-- SETTINGS -->
  <div id="at-settings" style="display:none">
    <div class="am-head"><h2>Settings</h2></div>
    <div class="am-body">
      <div class="card" style="max-width:420px">
        <div style="font-size:14px;font-weight:700;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)">&#128274; Change Admin Password</div>
        <div class="fg"><label class="lbl">Current Password</label><input class="inp" id="cur-pass" type="password" placeholder="Current"></div>
        <div class="fg"><label class="lbl">New Password</label><input class="inp" id="new-pass" type="password" placeholder="New"></div>
        <div class="fg"><label class="lbl">Confirm New</label><input class="inp" id="con-pass" type="password" placeholder="Confirm"></div>
        <button class="btn btn-primary" onclick="changePass()">Update Password</button>
      </div>
    </div>
  </div>
</div>
</div>

<!-- STUDENT -->
<div id="student" class="screen">
<nav class="topnav">
  <div class="logo">GATE<span>Portal</span></div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="uchip"><div class="uav" id="nav-av">?</div><span id="nav-nm">—</span></div>
    <button class="btn btn-ghost btn-sm" onclick="logout()">Logout</button>
  </div>
</nav>
<div class="stnav">
  <div class="sttab on" id="stt-tests" onclick="stTab('tests')">&#128203; Tests</div>
  <div class="sttab" id="stt-lb"    onclick="stTab('lb')">&#127942; Leaderboard</div>
  <div class="sttab" id="stt-an"    onclick="stTab('an')">&#128202; Analysis</div>
  <div class="sttab" id="stt-mine"  onclick="stTab('mine')">&#128100; My Results</div>
</div>
<div class="stcontent">
  <div id="stt-tests-c" style="padding:22px 28px"><div id="st-tlist"></div></div>
  <div id="stt-lb-c" style="display:none">
    <div class="lbtsel"><label class="lbl">Select Test</label>
      <select class="sel" id="lb-sel" onchange="loadLB()" style="max-width:360px"></select></div>
    <div id="lb-content"></div>
  </div>
  <div id="stt-an-c" style="display:none">
    <div class="lbtsel"><label class="lbl">Select Test</label>
      <select class="sel" id="an-sel" onchange="loadAN()" style="max-width:360px"></select></div>
    <div id="an-content"></div>
  </div>
  <div id="stt-mine-c" style="display:none;padding:22px 28px"><div id="mine-content"></div></div>
</div>
<!-- INSTRUCTIONS -->
<div id="st-instr" style="display:none;flex:1;align-items:center;justify-content:center;padding:32px">
<div class="ibox">
  <h2 id="instr-title" style="font-size:20px;font-weight:800;margin-bottom:16px">Instructions</h2>
  <div class="tleg">
    <div class="tli"><strong style="color:var(--a1)">MCQ</strong>Single correct<br><span style="color:var(--muted);font-size:11px">Neg marking</span></div>
    <div class="tli"><strong style="color:var(--yellow)">MSQ</strong>All correct<br><span style="color:var(--muted);font-size:11px">No negative</span></div>
    <div class="tli"><strong style="color:var(--a3)">NAT</strong>Numerical<br><span style="color:var(--muted);font-size:11px">No negative</span></div>
  </div>
  <div class="irule"><span>&#9201;</span><span>Timer starts on <strong>Begin Exam</strong>. Auto-submits when time ends.</span></div>
  <div class="irule"><span>&#128309;</span><span><strong>MCQ:</strong> One correct option. Wrong = negative marks.</span></div>
  <div class="irule"><span>&#128993;</span><span><strong>MSQ:</strong> Select ALL correct. Partial = 0. No negative.</span></div>
  <div class="irule"><span>&#128994;</span><span><strong>NAT:</strong> Type exact number. No negative marking.</span></div>
  <div class="irule"><span>&#128278;</span><span>Use <strong>Mark for Review</strong> to revisit questions.</span></div>
  <div id="instr-custom" style="margin-top:14px;padding:12px;background:var(--s2);border-radius:8px;font-size:14px;color:var(--muted);line-height:1.7;border:1px solid var(--border)"></div>
  <div style="margin-top:20px;display:flex;gap:10px;justify-content:flex-end">
    <button class="btn btn-ghost" onclick="stTab('tests')">&#8592; Back</button>
    <button class="btn btn-primary btn-lg" onclick="beginExam()">Begin Exam &#8594;</button>
  </div>
</div>
</div>
<!-- EXAM -->
<div id="exam-screen">
  <div class="exam-top">
    <div><h3 id="exam-ttop" style="font-size:14px;font-weight:700">—</h3><p id="exam-stop" style="font-size:12px;color:var(--muted)">—</p></div>
    <div style="display:flex;align-items:center;gap:13px">
      <div><div style="font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:1px">Time Left</div>
        <div class="tv" id="timer1">00:00</div></div>
      <button class="btn btn-danger btn-sm" onclick="confirmSubmit()">Submit</button>
    </div>
  </div>
  <div class="exam-layout">
    <div class="exam-main" id="exam-panel"></div>
    <div class="exam-side">
      <div class="ts"><div style="font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px">Time Remaining</div>
        <div class="tv" id="timer2">00:00</div></div>
      <div><div style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Questions</div>
        <div class="qpal" id="qpal"></div></div>
      <div style="display:flex;flex-direction:column;gap:5px">
        <div class="leg"><div class="ldot" style="background:var(--a1)"></div>Current</div>
        <div class="leg"><div class="ldot" style="background:rgba(56,189,248,.2);border:1px solid var(--a1)"></div>Answered</div>
        <div class="leg"><div class="ldot" style="background:rgba(251,191,36,.2);border:1px solid var(--yellow)"></div>Review</div>
        <div class="leg"><div class="ldot" style="background:var(--s2);border:1px solid var(--border)"></div>Unanswered</div>
      </div>
      <div class="slive" id="slive"></div>
    </div>
  </div>
</div>
<!-- RESULT -->
<div id="result-screen">
  <div class="res-hero">
    <div class="sring">
      <svg viewBox="0 0 140 140"><circle cx="70" cy="70" r="60" fill="none" stroke="var(--border)" stroke-width="8"/><circle id="ring-c" cx="70" cy="70" r="60" fill="none" stroke="var(--a1)" stroke-width="8" stroke-dasharray="376.99" stroke-dashoffset="376.99" stroke-linecap="round" transform="rotate(-90 70 70)" style="transition:stroke-dashoffset 1.2s ease"/></svg>
      <div class="pct" id="res-pct">0%</div><div class="plbl">Score</div>
    </div>
    <div style="font-size:24px;font-weight:900;letter-spacing:-.5px;margin-bottom:7px" id="res-vd">—</div>
    <div style="color:var(--muted);font-size:14px" id="res-sub">—</div>
    <div class="res-stats">
      <div class="rs"><div class="rs-v" id="rs-mk" style="color:var(--a1)">—</div><div class="rs-l">Marks</div></div>
      <div class="rs"><div class="rs-v" id="rs-rk" style="color:var(--yellow)">—</div><div class="rs-l">Rank</div></div>
      <div class="rs"><div class="rs-v" id="rs-co" style="color:var(--a3)">—</div><div class="rs-l">&#10003; Correct</div></div>
      <div class="rs"><div class="rs-v" id="rs-wr" style="color:var(--red)">—</div><div class="rs-l">&#10007; Wrong</div></div>
    </div>
    <div style="display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin-top:6px">
      <button class="btn btn-ghost btn-sm" onclick="stTab('tests')">&#8592; Back to Tests</button>
      <button class="btn btn-purple btn-sm" onclick="stTab('lb')">&#127942; Leaderboard</button>
      <button class="btn btn-ghost btn-sm" onclick="stTab('an')">&#128202; Analysis</button>
    </div>
  </div>
  <div class="rev-sec">
    <h3 style="font-size:17px;font-weight:800;margin-bottom:14px">&#128218; Answer Review</h3>
    <div id="rev-list"></div>
  </div>
</div>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <h3 id="modal-t">Submit?</h3><p id="modal-m">Sure?</p>
    <div class="mbtns">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="doSubmit()">Submit Now</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const L=['A','B','C','D'];
const QM={mcq:{label:'MCQ',cls:'qt-mcq'},msq:{label:'MSQ',cls:'qt-msq'},nat:{label:'NAT',cls:'qt-nat'}};
const uid=()=>Math.random().toString(36).substr(2,9);
const rCode=()=>Math.random().toString(36).substr(2,6).toUpperCase();
const negVal=(m,f)=>{if(f==='0')return 0;const[n,d]=f.split('/').map(Number);return-(m*n/d);};
const negStr=(m,f)=>{if(f==='0')return'0';const[n,d]=f.split('/').map(Number);return'\u2212'+(m*n/d).toFixed(2).replace(/\.?0+$/,'');};
const initials=n=>(n||'?').split(' ').map(w=>w[0]).join('').substr(0,2).toUpperCase();
const fmt=s=>`${Math.floor(s/60)}m ${s%60}s`;
let CU=null,adminPass='admin123',students={},editQs=[],currentTest=null;
const exam={test:null,ans:{},msq:{},nat:{},rev:new Set(),curQ:0,timeLeft:0,startTs:0,done:false,ti:null};

function toast(msg,type='ok'){const el=document.getElementById('toast');el.className='toast '+type;el.innerHTML=(type==='ok'?'&#10003;':'&#10007;')+' '+msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),3200);}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function showScreen(s){document.querySelectorAll('.screen').forEach(x=>x.classList.remove('on'));document.getElementById(s).classList.add('on');}
function logout(){CU=null;sessionStorage.removeItem('gp_u');showScreen('login');}

document.addEventListener('db-ready',async()=>{
  document.getElementById('ls').style.display='none';
  students=await window._db.loadStudents().catch(()=>({}));
  const cfg=await window._db.loadCfg().catch(()=>({}));
  if(cfg.adminPass)adminPass=cfg.adminPass;
  const saved=sessionStorage.getItem('gp_u');
  if(saved){CU=JSON.parse(saved);CU.isAdmin?enterAdmin():enterStudent();}
  else showScreen('login');
});
setTimeout(()=>{if(!window._dbReady)document.getElementById('ls').innerHTML='<div style="text-align:center;padding:40px;max-width:480px"><div style="font-size:44px;margin-bottom:12px">\u26a0\ufe0f</div><h2 style="font-weight:800;margin-bottom:10px">Firebase Not Configured</h2><p style="color:var(--muted);line-height:1.7">Open <strong>index.html</strong> and paste your Firebase config at the top. See <strong>SETUP.md</strong> for instructions.</p></div>';},8000);

// LOGIN
function lTab(t){
  document.getElementById('lf-s').style.display=t==='s'?'block':'none';
  document.getElementById('lf-a').style.display=t==='a'?'block':'none';
  document.getElementById('lt-s').classList.toggle('on',t==='s');
  document.getElementById('lt-a').classList.toggle('on',t==='a');
}
async function sLogin(){
  const u=document.getElementById('s-uid').value.trim().toUpperCase();
  const p=document.getElementById('s-pass').value;
  if(!u||!p){toast('Enter UID and password','err');return;}
  students=await window._db.loadStudents().catch(()=>({}));
  const st=students[u];
  if(!st||st.password!==p){toast('Invalid UID or password','err');return;}
  CU={uid:u,name:st.name,isAdmin:false};
  sessionStorage.setItem('gp_u',JSON.stringify(CU));enterStudent();
}
async function aLogin(){
  if(document.getElementById('a-pass').value!==adminPass){toast('Wrong admin password','err');return;}
  CU={uid:'admin',name:'Admin',isAdmin:true};
  sessionStorage.setItem('gp_u',JSON.stringify(CU));enterAdmin();
}

// ADMIN
function enterAdmin(){showScreen('admin');aTab('tests');}
function aTab(t){
  ['tests','create','results','students','settings'].forEach(x=>{
    document.getElementById('at-'+x).style.display=x===t?'block':'none';
    document.getElementById('sl-'+x).classList.toggle('on',x===t);
  });
  if(t==='tests')renderTList();
  if(t==='create')initCreate();
  if(t==='results'){popAdminSel();loadAdminRes();}
  if(t==='students')renderSted();
}
function renderSted(){
  const keys=Array.from({length:10},(_,i)=>`S${String(i+1).padStart(2,'0')}`);

function initCreate(){
  ['ct-title','ct-sub','ct-instr'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('ct-dur').value='180';document.getElementById('ct-total').value='100';document.getElementById('ct-multi').value='no';
  editQs=[];renderQB();addQ('mcq');
}
function addQ(type){
  const q={id:uid(),type,text:'',marks:2,imageUrl:''};
  if(type==='mcq'){q.options=['','','',''];q.correct=0;q.negFrac='1/3';}
  if(type==='msq'){q.options=['','','',''];q.corrects=[];}
  if(type==='nat'){q.answer='';q.tolerance=0;}
  editQs.push(q);renderQB();
}
function removeQ(id){editQs=editQs.filter(q=>q.id!==id);renderQB();}
function setQ(id,f,v){const q=editQs.find(q=>q.id===id);if(q)q[f]=v;}
function setOpt(id,i,v){const q=editQs.find(q=>q.id===id);if(q)q.options[i]=v;}
function togMSQC(id,i,chk){const q=editQs.find(q=>q.id===id);if(!q)return;if(!q.corrects)q.corrects=[];q.corrects=chk?[...new Set([...q.corrects,i])]:q.corrects.filter(x=>x!==i);}
function chgQType(id,type){
  const q=editQs.find(q=>q.id===id);if(!q)return;q.type=type;q.marks=q.marks||2;
  if(type==='mcq'){q.options=q.options||['','','',''];q.correct=0;q.negFrac='1/3';delete q.corrects;delete q.answer;}
  if(type==='msq'){q.options=q.options||['','','',''];q.corrects=[];delete q.correct;delete q.negFrac;delete q.answer;}
  if(type==='nat'){q.answer='';q.tolerance=0;delete q.options;delete q.correct;delete q.negFrac;delete q.corrects;}
  renderQB();
}

async function saveTest(){
  const title=document.getElementById('ct-title').value.trim();
  if(!title){toast('Enter test title','err');return;}
  if(!editQs.length){toast('Add at least one question','err');return;}
  for(let[i,q]of editQs.entries()){
    if(!q.text.trim()){toast(`Q${i+1}: text empty`,'err');return;}
    if(q.type!=='nat'&&q.options.some(o=>!o.trim())){toast(`Q${i+1}: fill all options`,'err');return;}
    if(q.type==='msq'&&(!q.corrects||!q.corrects.length)){toast(`Q${i+1}: check correct options`,'err');return;}
    if(q.type==='nat'&&q.answer===''){toast(`Q${i+1}: enter correct answer`,'err');return;}
  }
  const btn=document.getElementById('pub-btn');btn.disabled=true;btn.innerHTML='<span class="loader"></span> Saving&hellip;';
  const test={id:uid(),code:rCode(),title,subject:document.getElementById('ct-sub').value,
    duration:parseInt(document.getElementById('ct-dur').value)||180,
    totalMarks:parseFloat(document.getElementById('ct-total').value)||100,
    multiAttempt:document.getElementById('ct-multi').value==='yes',
    instructions:document.getElementById('ct-instr').value,
    questions:JSON.parse(JSON.stringify(editQs)),createdAt:new Date().toISOString()};
  try{await window._db.saveTest(test);toast(`Published! Code: ${test.code}`);aTab('tests');}
  catch(e){toast('Save failed','err');}
  btn.disabled=false;btn.innerHTML='&#128190; Publish Test';
}

function beginExam(){
  document.getElementById('st-instr').style.display='none';
  document.getElementById('exam-screen').style.display='flex';
  exam.test=currentTest;exam.ans={};exam.msq={};exam.nat={};
  exam.rev=new Set();exam.curQ=0;exam.timeLeft=currentTest.duration*60;
  exam.startTs=Date.now();exam.done=false;
  document.getElementById('exam-ttop').textContent=currentTest.title;
  document.getElementById('exam-stop').textContent=`${CU.name} \u00b7 ${CU.uid}`;
  renderQ();startTimer();
}
function startTimer(){
  clearInterval(exam.ti);
  exam.ti=setInterval(()=>{
    exam.timeLeft--;
    const m=String(Math.floor(exam.timeLeft/60)).padStart(2,'0'),s=String(exam.timeLeft%60).padStart(2,'0');
    const txt=`${m}:${s}`,cls=exam.timeLeft<60?'danger':exam.timeLeft<300?'warn':'';
    ['timer1','timer2'].forEach(id=>{const el=document.getElementById(id);if(el){el.textContent=txt;el.className='tv '+cls;}});
    if(exam.timeLeft<=0){clearInterval(exam.ti);doSubmit();}
  },1000);
}
function isAns(i){const q=exam.test.questions[i];if(q.type==='mcq')return exam.ans[i]!==undefined;if(q.type==='msq')return(exam.msq[i]||[]).length>0;return exam.nat[i]!==undefined&&exam.nat[i]!=='';}
function calcLive(){
  let marks=0,correct=0,wrong=0,skipped=0;
  exam.test.questions.forEach((q,i)=>{
    if(q.type==='mcq'){if(exam.ans[i]===undefined){skipped++;return;}if(exam.ans[i]===q.correct){marks+=q.marks;correct++;}else{marks+=negVal(q.marks,q.negFrac);wrong++;}}
    else if(q.type==='msq'){const s=(exam.msq[i]||[]).slice().sort().join(',');const c=(q.corrects||[]).slice().sort().join(',');if(!s){skipped++;return;}if(s===c){marks+=q.marks;correct++;}else wrong++;}
    else{const v=parseFloat(exam.nat[i]??'');const a=parseFloat(q.answer);if(exam.nat[i]===undefined||exam.nat[i]===''){skipped++;return;}if(!isNaN(v)&&!isNaN(a)&&Math.abs(v-a)<=q.tolerance){marks+=q.marks;correct++;}else wrong++;}
  });
  return{marks:marks.toFixed(2),correct,wrong,skipped};
}
function renderQ(){
  const q=exam.test.questions[exam.curQ],tot=exam.test.questions.length,ls=calcLive();
  document.getElementById('slive').innerHTML=`<div style="font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px">Live Score</div>
    <div class="slr"><span>Marks:</span><span style="font-weight:700;color:var(--a1)">${ls.marks}</span></div>
    <div class="slr"><span style="color:var(--a3)">&#10003; Correct:</span><span>${ls.correct}</span></div>
    <div class="slr"><span style="color:var(--red)">&#10007; Wrong:</span><span>${ls.wrong}</span></div>
    <div class="slr"><span style="color:var(--yellow)">&#8614; Skipped:</span><span>${ls.skipped}</span></div>`;
  document.getElementById('qpal').innerHTML=exam.test.questions.map((_,i)=>`<div class="qp ${i===exam.curQ?'cur':exam.rev.has(i)?'rev':isAns(i)?'ans':''}" onclick="goQ(${i})">${i+1}</div>`).join('');
  const ni=q.type==='mcq'?`<span style="color:var(--red)">${negStr(q.marks,q.negFrac)}</span> wrong`:'<span style="color:var(--muted)">0</span> wrong (no neg)';
  let oh='';
  if(q.type==='mcq'){
    oh=`<div class="mcq-opts">${q.options.map((o,i)=>`<button class="opt-btn ${exam.ans[exam.curQ]===i?'sel':''}" onclick="selMCQ(${i})"><div class="oc">${L[i]}</div>${o}</button>`).join('')}</div>`;
  }else if(q.type==='msq'){
    const sel=exam.msq[exam.curQ]||[];
    oh=`<div style="font-size:13px;color:var(--yellow);margin-bottom:9px">&#9888; Select ALL correct. Partial = 0 marks.</div>
      <div class="mcq-opts">${q.options.map((o,i)=>`<button class="opt-btn ${sel.includes(i)?'msel':''}" onclick="togMSQ(${i})"><div class="oc" style="${sel.includes(i)?'background:var(--yellow);border-color:var(--yellow);color:#000':''}">${sel.includes(i)?'&#10003;':L[i]}</div>${o}</button>`).join('')}</div>`;
  }else{
    oh=`<div style="margin-top:6px"><input class="nat-inp" type="number" step="any" placeholder="Type answer&#8230;" value="${exam.nat[exam.curQ]??''}" oninput="exam.nat[exam.curQ]=this.value"><div style="font-size:12px;color:var(--muted);margin-top:7px">Enter exact numerical answer</div></div>`;
  }
  const ir=exam.rev.has(exam.curQ);
  document.getElementById('exam-panel').innerHTML=`<div class="q-panel">
    <span class="qtag ${QM[q.type].cls}">${QM[q.type].label} &mdash; Q${exam.curQ+1} of ${tot}</span>
    <div style="font-size:17px;font-weight:500;line-height:1.65;margin-bottom:${q.imageUrl?'12px':'18px'}">${q.text}</div>
    ${q.imageUrl?`<div style="margin-bottom:18px"><img src="${q.imageUrl}" alt="Question image" style="max-width:100%;max-height:340px;border-radius:10px;border:1px solid var(--border);object-fit:contain"></div>`:''}
    <div style="font-size:12px;color:var(--muted);margin-bottom:16px;padding:8px 12px;background:var(--s2);border-radius:6px">Marks: <span style="color:var(--a3);font-weight:700">+${q.marks}</span> correct | ${ni} | <strong style="color:var(--muted)">0</strong> skipped</div>
    ${oh}
    <div class="qnav">
      <button class="btn btn-ghost btn-sm" onclick="prevQ()" ${exam.curQ===0?'disabled':''}>&#8592; Prev</button>
      <button class="mrb ${ir?'on':''}" onclick="togRev()">${ir?'&#128278; Marked':'&#128278; Review'}</button>
      <button class="btn btn-primary btn-sm" onclick="nextQ()">${exam.curQ===tot-1?'Finish &#8594;':'Next &#8594;'}</button>
      ${exam.curQ===tot-1?`<button class="btn btn-success btn-sm" onclick="confirmSubmit()">&#10003; Submit</button>`:''}
    </div>
  </div>`;
  if(window.MathJax)MathJax.typesetPromise([document.getElementById('exam-panel')]).catch(()=>{});
}
function selMCQ(i){exam.ans[exam.curQ]=i;renderQ();}
function togMSQ(i){let s=exam.msq[exam.curQ]||[];s=s.includes(i)?s.filter(x=>x!==i):[...s,i];exam.msq[exam.curQ]=s;renderQ();}
function prevQ(){if(exam.curQ>0){exam.curQ--;renderQ();}}
function nextQ(){if(exam.curQ<exam.test.questions.length-1){exam.curQ++;renderQ();}else confirmSubmit();}
function goQ(i){exam.curQ=i;renderQ();}
function togRev(){if(exam.rev.has(exam.curQ))exam.rev.delete(exam.curQ);else exam.rev.add(exam.curQ);renderQ();}
function confirmSubmit(){
  const ua=exam.test.questions.filter((_,i)=>!isAns(i)).length;
  document.getElementById('modal-t').textContent='Submit Test?';
  document.getElementById('modal-m').textContent=ua>0?`${ua} unanswered question(s). Submit anyway?`:'All answered. Submit now?';
  document.getElementById('modal').classList.add('open');
}
async function doSubmit(){
  closeModal();clearInterval(exam.ti);
  if(exam.done)return;exam.done=true;
  const test=exam.test;let marks=0,correct=0,wrong=0,skipped=0;
  const details=test.questions.map((q,i)=>{
    let status='skipped',earned=0;
    if(q.type==='mcq'){if(exam.ans[i]===undefined)status='skipped';else if(exam.ans[i]===q.correct){status='correct';earned=q.marks;marks+=q.marks;correct++;}else{status='wrong';earned=negVal(q.marks,q.negFrac);marks+=earned;wrong++;}}
    else if(q.type==='msq'){const s=(exam.msq[i]||[]).slice().sort().join(',');const c=(q.corrects||[]).slice().sort().join(',');if(!s)status='skipped';else if(s===c){status='correct';earned=q.marks;marks+=q.marks;correct++;}else{status='wrong';earned=0;wrong++;}}
    else{const v=parseFloat(exam.nat[i]??'');const a=parseFloat(q.answer);if(exam.nat[i]===undefined||exam.nat[i]==='')status='skipped';else if(!isNaN(v)&&!isNaN(a)&&Math.abs(v-a)<=q.tolerance){status='correct';earned=q.marks;marks+=q.marks;correct++;}else{status='wrong';earned=0;wrong++;}}
    if(status==='skipped')skipped++;
    return{status,earned,givenMCQ:exam.ans[i],givenMSQ:exam.msq[i]||[],givenNAT:exam.nat[i]||''};
  });
  const el=Math.round((Date.now()-exam.startTs)/1000);
  const sub={id:uid(),testCode:test.code,studentUid:CU.uid,name:CU.name,
    marksObtained:parseFloat(marks.toFixed(2)),correct,wrong,skipped,details,
    elapsedSecs:el,timeTaken:fmt(el),submittedAt:new Date().toISOString()};
  try{await window._db.saveSubmission(sub);}catch(e){console.error(e);}
  showResult(test,sub);
}
async function showResult(test,sub){
  document.getElementById('exam-screen').style.display='none';
  document.getElementById('result-screen').style.display='flex';
  const allSubs=await window._db.loadSubmissions(test.code);
  const best={};allSubs.forEach(s=>{if(!best[s.studentUid]||s.marksObtained>best[s.studentUid].marksObtained)best[s.studentUid]=s;});
  const ranked=Object.values(best).sort((a,b)=>b.marksObtained-a.marksObtained);
  const rank=ranked.findIndex(s=>s.studentUid===CU.uid)+1||ranked.length;
  const pct=Math.round(Math.max(0,sub.marksObtained)/test.totalMarks*100);
  document.getElementById('res-pct').textContent=pct+'%';
  document.getElementById('res-vd').textContent=pct>=60?'\ud83c\udf89 Great Performance!':pct>=40?'\ud83d\udc4d Average Performance':'\ud83d\udcda Needs Improvement';
  document.getElementById('res-sub').textContent=`${sub.name} \u00b7 ${sub.timeTaken}`;
  document.getElementById('rs-mk').textContent=`${sub.marksObtained}/${test.totalMarks}`;
  document.getElementById('rs-rk').textContent=`#${rank} / ${ranked.length}`;
  document.getElementById('rs-co').textContent=sub.correct;document.getElementById('rs-wr').textContent=sub.wrong;
  setTimeout(()=>{const c=document.getElementById('ring-c');if(c){c.style.strokeDashoffset=376.99*(1-pct/100);c.style.stroke=pct>=60?'var(--a3)':pct>=40?'var(--yellow)':'var(--red)';}},100);
  document.getElementById('rev-list').innerHTML=test.questions.map((q,i)=>{
    const d=sub.details[i];let gt='',ct='';
    if(q.type==='mcq'){gt=d.givenMCQ!==undefined?`${L[d.givenMCQ]}: ${q.options[d.givenMCQ]}`:'Not attempted';ct=`${L[q.correct]}: ${q.options[q.correct]}`;}
    else if(q.type==='msq'){gt=d.givenMSQ.length?d.givenMSQ.map(x=>`${L[x]}: ${q.options[x]}`).join(', '):'Not attempted';ct=q.corrects.map(x=>`${L[x]}: ${q.options[x]}`).join(', ');}
    else{gt=d.givenNAT||'Not attempted';ct=`${q.answer}${q.tolerance>0?` (\u00b1${q.tolerance})`:''}`;}
    const ec=d.earned>0?'mc-p':d.earned<0?'mc-n':'mc-z';
    return`<div class="rev-item">
      <div style="font-size:10px;color:var(--muted);font-weight:700;margin-bottom:7px;display:flex;align-items:center;gap:7px">
        <span class="qtag ${QM[q.type].cls}" style="margin-bottom:0;font-size:9px;padding:2px 7px">${QM[q.type].label}</span> Q${i+1}
        <span class="mchip ${ec}">${d.earned>0?'+':''}${d.earned}</span></div>
      <div style="font-size:14px;font-weight:500;line-height:1.6;margin-bottom:${q.imageUrl?'8px':'12px'}">${q.text}</div>
      ${q.imageUrl?`<div style="margin-bottom:12px"><img src="${q.imageUrl}" alt="Question image" style="max-width:100%;max-height:260px;border-radius:8px;border:1px solid var(--border);object-fit:contain"></div>`:''}
      <div class="ra ${d.status==='correct'?'ra-c':d.status==='wrong'?'ra-w':'ra-s'}">${d.status==='correct'?'&#10003;':d.status==='wrong'?'&#10007;':'&#8614;'} <strong>Your answer:</strong> ${gt}</div>
      ${d.status!=='correct'?`<div class="ra ra-c">&#10003; <strong>Correct:</strong> ${ct}</div>`:''}</div>`;
  }).join('');
  if(window.MathJax)MathJax.typesetPromise([document.getElementById('rev-list')]).catch(()=>{});
}
// LEADERBOARD
async function loadLB(){
  const code=document.getElementById('lb-sel').value,c=document.getElementById('lb-content');
  if(!code){c.innerHTML='';return;}
  c.innerHTML='<div style="padding:28px;text-align:center"><div class="loader"></div></div>';
  const[test,subs]=await Promise.all([window._db.loadTest(code),window._db.loadSubmissions(code)]);
  if(!subs.length){c.innerHTML='<div class="empty"><div class="empty-icon">&#127942;</div><h3>No submissions yet</h3></div>';return;}
  const best={};subs.forEach(s=>{if(!best[s.studentUid]||s.marksObtained>best[s.studentUid].marksObtained)best[s.studentUid]=s;});
  const ranked=Object.values(best).sort((a,b)=>b.marksObtained-a.marksObtained);
  const medals=['\ud83e\udd47','\ud83e\udd48','\ud83e\udd49'];
  const top3=ranked.slice(0,3);
  // Visual order: 2nd(left), 1st(center), 3rd(right)
  const vorder=top3.length===1?[0]:top3.length===2?[1,0]:[1,0,2];
  const podItems=vorder.map(ri=>({s:top3[ri],ri})).filter(x=>x.s);
  const podHTML=podItems.map(({s,ri})=>`<div class="pod pod-${ri+1}">
    <div class="pod-av">${initials(s.name)}</div>
    <div class="pod-nm">${s.name}${s.studentUid===CU.uid?' \u2b50':''}</div>
    <div class="pod-sc">${s.marksObtained}/${test.totalMarks}</div>
    <div class="pod-bl">${medals[ri]}</div>
  </div>`).join('');
  const tableHTML=ranked.map((s,i)=>`<div class="lb-row ${s.studentUid===CU.uid?'me':''}">
    <div class="lb-rk" style="color:${i===0?'#f59e0b':i===1?'#94a3b8':i===2?'#b45309':'var(--muted)'}">${i<3?medals[i]:'#'+(i+1)}</div>
    <div class="lbav">${initials(s.name)}</div>
    <div style="flex:1"><div style="font-weight:600;font-size:14px">${s.name}${s.studentUid===CU.uid?' <span class="badge bb" style="font-size:10px;padding:2px 7px">You</span>':''}</div>
      <div style="font-size:12px;color:var(--muted)">${s.timeTaken} &middot; &#10003;${s.correct} &#10007;${s.wrong}</div></div>
    <div style="display:flex;align-items:center;gap:11px">
      <div class="lb-bar"><div class="lb-bar-f" style="width:${Math.max(0,s.marksObtained/test.totalMarks*100)}%"></div></div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;color:var(--a1)">${s.marksObtained}<span style="font-size:11px;color:var(--muted)">/${test.totalMarks}</span></div>
    </div>
  </div>`).join('');
  c.innerHTML=`<div class="lb-podium">${podHTML}</div><div class="lb-tbl">${tableHTML}</div>`;
}
// ANALYSIS
async function loadAN(){
  const code=document.getElementById('an-sel').value,c=document.getElementById('an-content');
  if(!code){c.innerHTML='';return;}
  c.innerHTML='<div style="padding:28px;text-align:center"><div class="loader"></div></div>';
  const[test,subs]=await Promise.all([window._db.loadTest(code),window._db.loadSubmissions(code)]);
  if(!subs.length){c.innerHTML='<div class="empty"><div class="empty-icon">&#128202;</div><h3>No data yet</h3></div>';return;}
  const total=test.totalMarks;
  const avg=(subs.reduce((a,s)=>a+s.marksObtained,0)/subs.length).toFixed(2);
  const hi=Math.max(...subs.map(s=>s.marksObtained)),lo=Math.min(...subs.map(s=>s.marksObtained));
  // Distribution
  const bkts=[0,0,0,0];
  subs.forEach(s=>{const p=Math.max(0,s.marksObtained)/total*100;if(p<25)bkts[0]++;else if(p<50)bkts[1]++;else if(p<75)bkts[2]++;else bkts[3]++;});
  const bmax=Math.max(...bkts,1);
  const bcols=['var(--red)','var(--orange)','var(--yellow)','var(--a3)'];
  const blbls=['0\u201325%','25\u201350%','50\u201375%','75\u2013100%'];
  // Q accuracy
  const qacc=test.questions.map((q,i)=>{
    let correct=0,att=0;
    subs.forEach(s=>{if(!s.details||!s.details[i])return;const d=s.details[i];if(d.status!=='skipped')att++;if(d.status==='correct')correct++;});
    return{q,i,correct,att,skip:subs.length-att,acc:att?Math.round(correct/att*100):0};
  });
  // Time
  const td=subs.filter(s=>s.elapsedSecs).map(s=>({name:s.name,secs:s.elapsedSecs,uid:s.studentUid})).sort((a,b)=>a.secs-b.secs);
  const mxs=td.length?Math.max(...td.map(t=>t.secs)):1;
  c.innerHTML=`<div class="ansec">
    <div class="stat-g">
      <div class="stat-b"><div class="stat-v">${subs.length}</div><div class="stat-l">Total Attempts</div></div>
      <div class="stat-b"><div class="stat-v" style="color:var(--a1)">${avg}</div><div class="stat-l">Avg Marks</div></div>
      <div class="stat-b"><div class="stat-v" style="color:var(--a3)">${hi}</div><div class="stat-l">Highest</div></div>
      <div class="stat-b"><div class="stat-v" style="color:var(--red)">${lo}</div><div class="stat-l">Lowest</div></div>
    </div>
    <div class="antit">&#128202; Marks Distribution</div>
    <div class="chwrap">
      <div class="chtit">Students per score range (${subs.length} total attempts)</div>
      <div class="barchart">${bkts.map((cnt,i)=>`
        <div class="bcol">
          <div class="bfill" style="height:${Math.max(8,Math.round(cnt/bmax*120))}px;background:${bcols[i]}">
            <div class="bval">${cnt}</div></div>
          <div class="blbl">${blbls[i]}</div>
        </div>`).join('')}</div>
    </div>
    <div class="antit">&#127919; Question-wise Accuracy</div>
    <div class="card" style="padding:0;overflow:hidden;margin-bottom:20px">
      <table class="qat">
        <thead><tr><th>#</th><th>Type</th><th>Question</th><th>Attempted</th><th>Correct</th><th>Skipped</th><th>Accuracy</th></tr></thead>
        <tbody>${qacc.map(({q,i,correct,att,skip,acc})=>`<tr>
          <td style="font-family:'IBM Plex Mono',monospace;font-weight:700">Q${i+1}</td>
          <td><span class="qtag ${QM[q.type].cls}" style="margin-bottom:0;font-size:9px;padding:2px 6px">${QM[q.type].label}</span></td>
          <td style="max-width:240px">${q.text.length>50?q.text.substr(0,50)+'&#8230;':q.text}</td>
          <td>${att}/${subs.length}</td><td style="color:var(--a3)">${correct}</td><td style="color:var(--yellow)">${skip}</td>
          <td><div style="font-weight:700;font-size:13px;color:${acc>=70?'var(--a3)':acc>=40?'var(--yellow)':'var(--red)'}">${acc}%</div>
            <div class="accbar"><div class="accfill" style="width:${acc}%;background:${acc>=70?'var(--a3)':acc>=40?'var(--yellow)':'var(--red)'}"></div></div></td>
        </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div class="antit">&#9201; Time Taken per Student</div>
    <div class="tlist">${td.map(t=>`
      <div class="trow ${t.uid===CU.uid?'me':''}">
        <div class="lbav">${initials(t.name)}</div>
        <div style="flex:1;font-weight:600;font-size:14px">${t.name}${t.uid===CU.uid?' <span class="badge bb" style="font-size:10px;padding:2px 6px">You</span>':''}</div>
        <div class="tbw"><div class="tbf" style="width:${Math.round(t.secs/mxs*100)}%"></div></div>
        <div class="tval">${fmt(t.secs)}</div>
      </div>`).join('')}
    </div>
  </div>`;
}
// MY RESULTS
async function loadMine(){
  const c=document.getElementById('mine-content');
  c.innerHTML='<div style="padding:28px;text-align:center"><div class="loader"></div></div>';
  const tests=await window._db.loadTests();const rows=[];
  await Promise.all(tests.map(async t=>{const s=await window._db.loadSubmissions(t.code);const mine=s.filter(s=>s.studentUid===CU.uid);if(mine.length)rows.push({test:t,subs:mine});}));
  if(!rows.length){c.innerHTML='<div class="empty"><div class="empty-icon">&#128100;</div><h3>No attempts yet</h3><p>Go to Tests tab to start</p></div>';return;}
  c.innerHTML=rows.map(({test,subs})=>{
    const best=subs.sort((a,b)=>b.marksObtained-a.marksObtained)[0];
    const pct=Math.round(Math.max(0,best.marksObtained)/test.totalMarks*100);
    return`<div class="card" style="margin-bottom:12px">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:12px">
        <div><div style="font-size:15px;font-weight:700">${test.title}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">${subs.length} attempt${subs.length>1?'s':''}</div></div>
        <div style="text-align:right"><div style="font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;color:${pct>=60?'var(--a3)':pct>=40?'var(--yellow)':'var(--red)'}">${best.marksObtained}/${test.totalMarks}</div>
          <div style="font-size:12px;color:var(--muted)">Best &middot; ${pct}%</div></div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:7px">
        <span class="badge bg">&#10003; ${best.correct} correct</span>
        <span class="badge br">&#10007; ${best.wrong} wrong</span>
        <span class="badge by">&#8614; ${best.skipped} skipped</span>
        <span class="badge bb">&#9201; ${best.timeTaken}</span>
      </div>
    </div>`;
  }).join('');
}
